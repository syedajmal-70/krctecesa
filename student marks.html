<!DOCTYPE html>


<head>
<title>Exam Result</title>

<script>
function btnFind_onclick() {
    var m1=numm1.value;
    var m2=numm2.value;

    m1=parseFloat(m1);
    m2=parseFloat(m2);

    var total=m1 + m2;
    var avg=total / 2;
    var result=(m1 > 34.4 && m2 > 34.4 ? "Pass" : "Fail");

    numtotal.value=total;
    numavg.value=avg;
    tbxresult.value=result;
}
</script>


</head>

<table border="1">
    <tr>
        <td>
            Roll no.
        </td>
    <td>
    <input
    type="number" id="numrno"
    placeholder="0" />
    </td>
</tr>


<tr>
        <td>
            Student name
        </td>
    <td>
    <input
    type="text" id="tbxname"
    placeholder="Unknown" />
    </td>
</tr>


<tr>
        <td>
            Mark-1
        </td>
    <td>
    <input
    type="number" id="numm1" steps="any"
    placeholder="0.0" />
    </td>
</tr>

<tr>
        <td>
            Mark-2
        </td>
    <td>
    <input
    type="number" id="numm2" steps="any"
    placeholder="0.0" />
    </td>
</tr>

<tr>
        <td>
            Total
        </td>
    <td>
    <input
    type="number" id="numtotal" steps="any"
    placeholder="0.0" readonly="readonly" />
    </td>
</tr>

<tr>
        <td>
            Average
        </td>
    <td>
    <input
    type="number" id="numavg" steps="any"
    placeholder="0.0" readonly="readonly"/>
    </td>
</tr>

<tr>
        <td>
            Result
        </td>
    <td>
    <input
    type="text" id="tbxresult"
    placeholder="Fail" readonly="readonly"/>
    </td>
</tr>

<tr>
    <td>
        <input type="button" value="Cancel" onclick="location.href='wp01.html';">
        </td>
        <td>
            <input type="button" value="Find" onclick="btnFind_onclick();">
            </td>
            </tr>
</table>
